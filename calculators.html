<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Finance Calculator - Farmer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .calc-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--primary-green);
            border-color: var(--primary-green);
        }

        .calc-section {
            display: none;
        }

        .calc-section.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            color: var(--text-muted);
            font-size: 13px;
        }

        .input-group input,
        .input-group select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .result-card {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-top: 30px;
        }

        .result-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-green);
            margin-top: 10px;
        }

        .table-container {
            margin-top: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }

        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }

        .income-text {
            color: #2ecc71;
        }

        .expense-text {
            color: #e74c3c;
        }

        .btn-primary {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-circle-small">
                <img src="assets/logo.png" alt="Farmers Logo">
            </div>
            <span class="nav-title" data-t="calc_header">Farm Finance Calculator</span>
        </div>
        <div class="nav-right">
            <a href="dashboard.html" class="logout-btn" id="dash-btn"
                style="color:white; background: rgba(255, 255, 255, 0.1);">Dashboard</a>
        </div>
    </nav>

    <div class="calc-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('income')" data-t="income_tab">Income & Expense</button>
            <button class="tab-btn" onclick="switchTab('profit')" data-t="profit_tab">Profit Analysis</button>
        </div>

        <!-- Income & Expense Section -->
        <section id="income-section" class="calc-section active glass-panel" style="padding: 30px;">
            <div class="form-grid">
                <div class="input-group">
                    <label data-t="item_name">Item Name</label>
                    <input type="text" id="inc-item" placeholder="e.g. Sales, Fertilizer">
                </div>
                <div class="input-group">
                    <label data-t="amount">Amount (₹)</label>
                    <input type="number" id="inc-amount">
                </div>
                <div class="input-group">
                    <label data-t="category">Category</label>
                    <select id="inc-type">
                        <option value="income" data-t="income">Income</option>
                        <option value="expense" data-t="expense">Expense</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="addEntry()" data-t="add_income">Add Entry</button>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th data-t="item_name">Item</th>
                            <th data-t="category">Type</th>
                            <th data-t="amount">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="entries-body">
                        <!-- Entries will appear here -->
                    </tbody>
                </table>
            </div>

            <div class="result-card">
                <h4 data-t="net_profit">Net Balance</h4>
                <div class="result-value" id="net-balance">₹ 0</div>
            </div>
        </section>

        <!-- Profit Analysis Section -->
        <section id="profit-section" class="calc-section glass-panel" style="padding: 30px;">
            <div class="form-grid">
                <div class="input-group">
                    <label data-t="seed_cost">Seed Cost</label>
                    <input type="number" id="seed-cost" value="0">
                </div>
                <div class="input-group">
                    <label data-t="fertilizer_cost">Fertilizer Cost</label>
                    <input type="number" id="fert-cost" value="0">
                </div>
                <div class="input-group">
                    <label data-t="labor_cost">Labor Cost</label>
                    <input type="number" id="labor-cost" value="0">
                </div>
                <div class="input-group">
                    <label data-t="market_price">Expected Market Price</label>
                    <input type="number" id="expect-price" value="0">
                </div>
            </div>
            <button class="btn-primary" onclick="calcProfit()" data-t="calculate">Calculate Profit</button>

            <div class="result-card">
                <h4 data-t="estimated_profit">Estimated Profit</h4>
                <div class="result-value" id="total-profit">₹ 0</div>
            </div>
        </section>
    </div>

    <script src="translations.js"></script>
    <script>
        let entries = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.calc-section').forEach(s => s.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`${tab}-section`).classList.add('active');
        }

        function addEntry() {
            const item = document.getElementById('inc-item').value;
            const amount = parseFloat(document.getElementById('inc-amount').value);
            const type = document.getElementById('inc-type').value;

            if (!item || isNaN(amount)) return;

            entries.push({ item, amount, type });
            updateEntriesTable();

            document.getElementById('inc-item').value = '';
            document.getElementById('inc-amount').value = '';
        }

        function updateEntriesTable() {
            const body = document.getElementById('entries-body');
            body.innerHTML = '';
            let total = 0;

            entries.forEach(e => {
                const row = `<tr>
                    <td>${e.item}</td>
                    <td class="${e.type === 'income' ? 'income-text' : 'expense-text'}">${e.type}</td>
                    <td>₹ ${e.amount}</td>
                </tr>`;
                body.innerHTML += row;
                total += (e.type === 'income' ? e.amount : -e.amount);
            });

            document.getElementById('net-balance').innerText = `₹ ${total}`;
            document.getElementById('net-balance').className = 'result-value ' + (total >= 0 ? 'income-text' : 'expense-text');
        }

        function calcProfit() {
            const seed = parseFloat(document.getElementById('seed-cost').value) || 0;
            const fert = parseFloat(document.getElementById('fert-cost').value) || 0;
            const labor = parseFloat(document.getElementById('labor-cost').value) || 0;
            const price = parseFloat(document.getElementById('expect-price').value) || 0;

            const profit = price - (seed + fert + labor);
            document.getElementById('total-profit').innerText = `₹ ${profit}`;
            document.getElementById('total-profit').className = 'result-value ' + (profit >= 0 ? 'income-text' : 'expense-text');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const user = urlParams.get('user');
            const lang = urlParams.get('lang') || 'en';

            if (user) {
                document.getElementById('dash-btn').href = `dashboard.html?user=${user}&lang=${lang}`;
            }
        });
    </script>
</body>

</html>
