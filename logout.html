<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Portal - Logout</title>
    <!-- Modern Google Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --text-light: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('assets/logout_bg.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        .logout-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            color: var(--text-light);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quote-1 {
            font-size: 1.5rem;
            line-height: 1.4;
            margin-bottom: 30px;
            font-weight: 400;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .quote-2 {
            font-size: 1.3rem;
            line-height: 1.4;
            margin-bottom: 40px;
            font-weight: 700;
            color: #81C784;
            /* Soft Green */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .login-again-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .login-again-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .login-again-btn:active {
            transform: translateY(-1px);
        }

        .nature-icon {
            margin-bottom: 20px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="background"></div>
    <div class="logout-container">
        <div class="nature-icon">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#81C784" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 8"></path>
                <path d="M3 21c.2-2.1 1.1-3.1 3-5 2.1-2.1 3.1-3.6 3-6"></path>
                <path d="M19 13c.2 2.1-.4 3.4-3 6-2.6 2.6-5.4 3-7 2"></path>
            </svg>
        </div>
        <div class="quote-1" data-t="logout_quote1">
            "Fields rest at sunset, but farmers never stop dreaming. <br>
            Come back soon and keep growing with us."
        </div>
        <div class="quote-2" data-t="logout_quote2">
            "The strength of our nation grows from its farms. <br>
            Thank you for being its backbone. Visit again."
        </div>
        <a href="index.html" class="login-again-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            <span data-t="login_again">Login Again</span>
        </a>
    </div>
    <script src="translations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const lang = urlParams.get('lang') || 'en';
            applyGlobalTranslations(lang);

            // Update page title too
            const t = translations[lang] || translations.en;
            if (t.logout_title) document.title = t.logout_title;
        });
    </script>
</body>

</html>
